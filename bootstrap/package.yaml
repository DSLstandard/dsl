name: dsl
version: 1.0.0
license: BSD-3-Clause

default-extensions:
  - AllowAmbiguousTypes
  - Arrows
  - BlockArguments
  - ConstraintKinds
  - DataKinds
  - DefaultSignatures
  - DeriveAnyClass
  - DeriveFoldable
  - DeriveFunctor
  - DeriveGeneric
  - DeriveTraversable
  - DerivingStrategies
  - DerivingVia
  - DuplicateRecordFields
  - EmptyCase
  - ExplicitForAll
  - FlexibleContexts
  - FlexibleInstances
  - FunctionalDependencies
  - GADTs
  - GeneralizedNewtypeDeriving
  - ImportQualifiedPost
  - LambdaCase
  - LiberalTypeSynonyms
  - MultiParamTypeClasses
  - MultiWayIf
  - NamedFieldPuns
  - NumericUnderscores
  - OverloadedLabels
  - OverloadedRecordDot
  - OverloadedStrings
  - PartialTypeSignatures
  - PatternSynonyms
  - QuasiQuotes
  - RankNTypes
  - RecordWildCards
  - RecursiveDo
  - ScopedTypeVariables
  - StandaloneDeriving
  - TemplateHaskell
  - TupleSections
  - TypeApplications
  - TypeFamilies
  - TypeOperators
  - UndecidableInstances
  - ViewPatterns
  - NoImplicitPrelude
ghc-options: -Wall -Wno-name-shadowing -Wno-orphans

executables:
  dsl_compiler:
    source-dirs: app/
    main: Main.hs
    ghc-options: -O2 -threaded -rtsopts -with-rtsopts=-N
    dependencies:
      - aeson
      - base
      - bytestring
      - co-log
      - co-log-core
      - containers
      - data-default
      - diagnose == 2.5.1
      - directory
      - dlist
      - exceptions
      - filepath
      - free
      - hashable
      - hashtables == 1.4.2 # Required because of https://github.com/gregorycollins/hashtables/issues/98
      - indexed-traversable
      - megaparsec
      - monad-dijkstra
      - mtl
      - neat-interpolation
      - optics
      - optics-core
      - optics-th
      - optparse-applicative
      - parser-combinators
      - prettyprinter
      - relude
      - scientific
      - semialign
      - text
      - these
      - time
      - trie-simple
      - unix
      - unordered-containers
      - vector
      - witherable